# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # Set the timeout for all server responses to 10 minutes.
  # This is useful for long-running server actions.
  # The maximum value is 600 seconds (10 minutes).
  timeoutSeconds: 600

# Make the Gemini API key available to the server environment.
# You will need to create this secret in Google Cloud Secret Manager.
secretEnvironmentVariables:
  - key: GEMINI_API_KEY
    secret: gemini-api-key
