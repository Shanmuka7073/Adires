# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # Set the timeout for all server responses to 10 minutes.
  # This is useful for long-running server actions.
  # The maximum value is 600 seconds (10 minutes).
  timeoutSeconds: 600
# The GEMINI_API_KEY is no longer needed on the server, as it's now used on the client.
# You can remove this section if you don't have other server-side secrets.
secretEnvironmentVariables: []
