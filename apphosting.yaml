# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # Set the timeout for all server responses to 10 minutes.
  # This is useful for long-running server actions.
  # The maximum value is 600 seconds (10 minutes).
  timeoutSeconds: 600
# Add a secret for the Gemini API key. The value should be set in Google Cloud Secret Manager.
secrets:
  - id: GEMINI_API_KEY
    version: 1
  - id: SERVICE_ACCOUNT
    version: 1
    
# The environment variable GEMINI_API_KEY will be available in the app
# by adding it here.
environmentVariables:
  GEMINI_API_KEY: ${secret:GEMINI_API_KEY}
  SERVICE_ACCOUNT: ${secret:SERVICE_ACCOUNT}
